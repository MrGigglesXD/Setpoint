<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SETPOINT</title>
<style>
body{font-family:Arial,sans-serif;background:#0F172A;color:#fff;margin:0;padding:20px}
.card{background:#1E293B;padding:15px;border-radius:12px;margin-bottom:12px}
input,button,select{padding:10px;border-radius:8px;border:none;margin:4px}
button{background:#2563EB;color:white}
.red{background:#DC2626}
.score{font-size:64px;font-weight:bold}
.row{display:flex;gap:10px;align-items:center}
</style>
</head>
<body>
<h1>🏐 SETPOINT</h1>

<div class="card">
<h3>Agregar jugador</h3>
<input id="name" placeholder="Nombre">
<select id="level">
<option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option>
</select>
<button onclick="addPlayer()">Agregar</button>
</div>

<div class="card">
<h3>Jugadores</h3>
<ul id="players"></ul>
</div>

<div class="card">
<h3>Marcador</h3>
<div class="row">
<div style="flex:1;text-align:center">
<h2>AZUL</h2>
<div id="blue" class="score">0</div>
<button onclick="score('blue',1)">+1</button>
<button onclick="score('blue',-1)">-1</button>
</div>
<div style="flex:1;text-align:center">
<h2>ROJO</h2>
<div id="red" class="score">0</div>
<button class="red" onclick="score('red',1)">+1</button>
<button onclick="score('red',-1)">-1</button>
</div>
</div>
<button onclick="undo()">↩ Undo</button>
</div>

<script>
let players=JSON.parse(localStorage.getItem('players')||'[]');
let blue=0,red=0,history=[];

function save(){
 localStorage.setItem('players',JSON.stringify(players));
}

function render(){
 document.getElementById('players').innerHTML=players.map(p=>
 `<li>${p.name} (Nivel ${p.level})</li>`).join('');
 document.getElementById('blue').textContent=blue;
 document.getElementById('red').textContent=red;
}
function addPlayer(){
 let n=document.getElementById('name').value.trim();
 let l=document.getElementById('level').value;
 if(!n)return;
 players.push({name:n,level:l});
 save(); render();
 document.getElementById('name').value='';
}
function score(team,val){
 history.push({blue,red});
 if(team==='blue') blue=Math.max(0,blue+val);
 else red=Math.max(0,red+val);
 render();
}
function undo(){
 if(!history.length)return;
 let h=history.pop();
 blue=h.blue; red=h.red;
 render();
}
render();
</script>
</body>
</html>
